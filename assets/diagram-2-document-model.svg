<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-label="Document and tile model diagram">
<style>
  text{font-family:Consolas,Menlo,'DejaVu Sans Mono',monospace;fill:#E8ECF5}
  .ttl{font-size:15px;font-weight:700;fill:#E8ECF5}
  .stp{font-size:11px;font-weight:700;fill:#FFB347;letter-spacing:2px}
  .n-title{font-size:14px;font-weight:700}
  .n-sub{font-size:11px;fill:#98A2B8}
  .lane-label{font-size:10px;fill:#8A94AD;letter-spacing:2px}
  .edge{stroke:#FFB347;stroke-width:2;fill:none}
  .edge.data{stroke:#5FE3D0;stroke-dasharray:5 4}
  .edge.ctl{stroke:#FF5C8A;stroke-width:1.5;opacity:.85}
  .elabel{font-size:11px;fill:#98A2B8}
  .elabel.data{fill:#5FE3D0}
  .elabel.ctl{fill:#FF5C8A}
  .node{fill:#0E1322;stroke:#31406A;stroke-width:1}
  .node.hot{stroke:#FFB347;stroke-width:1.5;filter:url(#glow2)}
  .node.data{stroke:#5FE3D0}
  .lane{fill:rgba(19,24,40,.6);stroke:#232D47;stroke-width:1;stroke-dasharray:2 4}
  .chip{fill:url(#chk2);stroke:#31406A;stroke-width:1}
  .marquee2{fill:none;stroke:#FFB347;stroke-width:1.5;stroke-dasharray:4 4}
  @media (prefers-reduced-motion:no-preference){
    .marquee2{animation:march2 1.2s linear infinite}
    @keyframes march2{to{stroke-dashoffset:-16}}
  }
</style>
<defs>
  <pattern id="chk2" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#1A2136"/>
    <rect width="4" height="4" fill="#2A3452"/>
    <rect x="4" y="4" width="4" height="4" fill="#2A3452"/>
  </pattern>
  <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FFB347" flood-opacity="0.28"/>
  </filter>
  <marker id="arr2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L8 4 L0 8 z" fill="#FFB347"/>
  </marker>
  <marker id="arrData2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L8 4 L0 8 z" fill="#5FE3D0"/>
  </marker>
  <marker id="arrCtl2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L8 4 L0 8 z" fill="#FF5C8A"/>
  </marker>
</defs>

<rect x="0" y="0" width="1080" height="460" fill="#121828"/>
<rect x="0.5" y="0.5" width="1079" height="459" fill="none" stroke="#232D47"/>

<text class="stp" x="20" y="28">[2/6]</text>
<text class="ttl" x="84" y="28">DOCUMENT &amp; TILE MODEL — flat typed array</text>

<g transform="translate(0,48)">
  <!-- consumer -->
  <g>
    <rect class="node" x="40" y="180" width="200" height="56"/>
    <text class="n-title" x="140" y="213" text-anchor="middle">React components</text>
  </g>
  <text class="elabel" x="40" y="270">no unrelated re-renders</text>

  <!-- store lane -->
  <rect class="lane" x="300" y="30" width="756" height="360"/>
  <text class="lane-label" x="316" y="52">ZUSTAND STORE</text>

  <rect class="lane" x="320" y="66" width="430" height="310"/>
  <text class="lane-label" x="336" y="86">DOCUMENTSSLICE · MAX 8</text>

  <!-- tile grid (hot) -->
  <g>
    <rect class="node hot" x="336" y="98" width="400" height="78"/>
    <rect class="marquee2" x="331" y="93" width="410" height="88"/>
    <rect class="chip" x="712" y="106" width="14" height="14"/>
    <text class="n-title" x="350" y="124">Tile grid</text>
    <text class="n-sub" x="350" y="144">Uint16Array · 65,536 tiles</text>
    <text class="n-sub" x="350" y="163">256 × 256 · 16-bit each</text>
  </g>
  <g>
    <rect class="node" x="336" y="190" width="400" height="48"/>
    <text class="n-title" x="350" y="212">Viewport</text>
    <text class="n-sub" x="350" y="230">x / y / zoom</text>
  </g>
  <g>
    <rect class="node" x="336" y="252" width="400" height="48"/>
    <text class="n-title" x="350" y="274">Selection</text>
    <text class="n-sub" x="350" y="292">+ paste state</text>
  </g>
  <g>
    <rect class="node" x="336" y="314" width="400" height="56"/>
    <text class="n-title" x="350" y="338">Undo / redo stacks</text>
    <text class="n-sub" x="350" y="357">50-deep snapshots</text>
  </g>

  <!-- sibling slices -->
  <g>
    <rect class="node data" x="792" y="98" width="252" height="104"/>
    <rect class="chip" x="1020" y="106" width="14" height="14"/>
    <text class="n-title" x="806" y="122">globalSlice</text>
    <text class="n-sub" x="806" y="142">current tool · tile/stamp</text>
    <text class="n-sub" x="806" y="161">grid · animation frame</text>
    <text class="n-sub" x="806" y="180">game-object tool config</text>
  </g>
  <g>
    <rect class="node data" x="792" y="214" width="252" height="76"/>
    <rect class="chip" x="1020" y="222" width="14" height="14"/>
    <text class="n-title" x="806" y="238">windowSlice</text>
    <text class="n-sub" x="806" y="258">MDI window positions</text>
    <text class="n-sub" x="806" y="277">z-order · minimized state</text>
  </g>

  <!-- edges -->
  <path class="edge data" d="M240 186 H298" marker-end="url(#arrData2)"/>
  <text class="elabel data" x="270" y="178" text-anchor="middle">selectors</text>
  <path class="edge ctl" d="M298 214 H242" marker-end="url(#arrCtl2)"/>
  <text class="elabel ctl" x="270" y="230" text-anchor="middle">actions</text>
</g>
</svg>
